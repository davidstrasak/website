<main class="viewport-window">
  <div class="title-bar">
    <div class="title-bar-text">First Post</div>
    <div class="window-controls">
      <button
        type="button"
        class="window-button"
        data-action="minimize"
        aria-label="Minimize window"
      >
        MIN
      </button>
      <button
        type="button"
        class="window-button"
        data-action="maximize"
        aria-label="Maximize window"
      >
        MAX
      </button>
      <button
        type="button"
        class="window-button close"
        data-action="close"
        aria-label="Close window"
      >
        CLOSE
      </button>
    </div>
  </div>

  <article class="window-body">
    <div class="cyber-text">

    <div class="content-body"><p>Refactored content from the old SvelteKit project goes here.</p>
<p>test</p>
</div>
  </article>
</main>

        </div>

        <footer class="taskbar">
            <div class="start-button">SYS</div>
            
            <div class="task-tab">First Post</div>
            
            <div class="clock" id="clock">00:00:00</div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ':' +
                         now.getMinutes().toString().padStart(2, '0') + ':' +
                         now.getSeconds().toString().padStart(2, '0');
        }

        function initWindowControls() {
            const windowEl = document.querySelector('.viewport-window');
            if (!windowEl) return;

            const buttons = windowEl.querySelectorAll('.window-button[data-action]');
            const homeUrl = '\/';

            buttons.forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.getAttribute('data-action');

                    if (action === 'minimize') {
                        windowEl.classList.toggle('is-minimized');
                        windowEl.classList.remove('is-maximized');
                        return;
                    }

                    if (action === 'maximize') {
                        windowEl.classList.toggle('is-maximized');
                        windowEl.classList.remove('is-minimized');
                        return;
                    }

                    if (action === 'close') {
                        window.location.href = homeUrl;
                    }
                });
            });
        }

        setInterval(updateClock, 1000);
        updateClock();
        initWindowControls();
    </script>
</body>
</html>
